name: Update CSV

on:
    schedule:
      - cron:  '0 9 1 * *'
    workflow_dispatch:

permissions: read-all

jobs:
    update-data:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
              with:
                  disable-sudo: true
                  egress-policy: audit

            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

            - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
              with:
                python-version: ${{ matrix.python-version }}
                activate-environment: true
                cache-dependency-glob: |
                  **/pyproject.toml
                  **/uv.lock
    
            - run: uv sync

            - name: Run package
              run: maine_state_senator_data

            - name: Commit Changes
              uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
              with:
                commit_message: Updated legislator data
