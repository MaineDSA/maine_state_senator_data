name: Update CSV

on:
    schedule:
      - cron:  '0 9 1 * *'
    workflow_dispatch:

permissions: read-all

jobs:
    update-data:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Harden runner
              uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
              with:
                  disable-sudo: true
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
              with:
                python-version: ${{ matrix.python-version }}
                activate-environment: true
                cache-dependency-glob: |
                  **/pyproject.toml
                  **/uv.lock
    
            - run: uv sync

            - name: Run package
              run: maine_state_senator_data

            - name: Commit Changes
              uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
              with:
                commit_message: Updated legislator data
