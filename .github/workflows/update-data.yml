name: Update CSV

on:
    schedule:
      - cron:  '0 9 1 * *'
    workflow_dispatch:

permissions: read-all

jobs:
    update-data:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
              with:
                  disable-sudo: true
                  egress-policy: audit

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
              with:
                python-version: ${{ matrix.python-version }}
                activate-environment: true
                cache-dependency-glob: |
                  **/pyproject.toml
                  **/uv.lock
    
            - run: uv sync

            - name: Run package
              run: maine_state_senator_data

            - name: Commit Changes
              uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d
              with:
                commit_message: Updated legislator data
